<h2 mat-dialog-title>
  Confirmar exclusão
</h2>

<mat-dialog-content>
  Deseja realmente excluir este título?
</mat-dialog-content>

<mat-dialog-actions align="end">

  <button mat-button mat-dialog-close>
    Cancelar
  </button>

  <button mat-raised-button color="warn" (click)="confirmar()">
    Excluir
  </button>

</mat-dialog-actions>
